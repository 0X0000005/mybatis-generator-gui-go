name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.20'

      - name: Install UPX
        run: choco install upx -y

      - name: Run Build Script
        shell: cmd
        run: |
          build.bat < nul

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mgg.exe
            mgg
          generate_release_notes: true
